# ═══════════════════════════════════════════════════════════════════════════════
# DIMENSIONS — orthogonal tag axes, intersected by composers/auto-router
# Per docs/plans/features/2026-04-08-auto-routing-design.md
# ═══════════════════════════════════════════════════════════════════════════════

dimensions:
  tier:
    quick:
      max_cost_per_1k_tokens: 0.001
      description: "Fast, cheap, good-enough for classification and routing"
    standard:
      max_cost_per_1k_tokens: 0.005
      description: "Balanced cost and quality for most production work"
    heavy:
      max_cost_per_1k_tokens: 0.020
      description: "High-quality reasoning for complex translation, synthesis, design"
    max:
      max_cost_per_1k_tokens: null
      description: "Best available, cost no object, used at peak-decision stages"

  task:
    code: "Code generation in any language"
    code-translation: "Translating code from one language to another"
    code-review: "Reading and critiquing existing code"
    review: "General review/critique of artifacts"
    research: "Open-ended exploration, web research, literature synthesis"
    writing: "Long-form natural-language writing"
    transform: "Mechanical transformation with tool use (file edits, refactors)"
    design: "Architecture, schema, system design"
    classification: "Categorization, routing, labeling, triage"
    synthesis: "Integrating diverse inputs into a unified position"
    planning: "Multi-step planning, task decomposition"
    reasoning: "Chain-of-thought, mathematical, deductive, formal reasoning"
    math: "Specialized math/formal reasoning sub-tag"
    tool-use: "Function calling, MCP, agentic tool orchestration"
    agent: "Autonomous multi-step agent workflows"
    careful-long-running: "Sustained complex work where premature compression is the failure mode"
    multilingual: "Cross-language work, translation, multi-language coverage"
    regional: "Language/region-specialized models (Arabic, Chinese, Japanese, etc.)"
    retrieval-augmented: "RAG-optimized: grounded generation with citations"
    transcription: "Speech-to-text transcription"
    streaming: "Real-time / streaming inference"
    conversational: "Dialogue, conversational TTS, real-time chat"
    routing: "Meta-routing or auto-selection of downstream models"
    general: "Generic general-purpose; no specialization"
    vision: "Image input understanding (also see modality.vision)"

  modality:
    text: "Text in, text out"
    vision: "Image in, text out"
    image-gen: "Text in, image out"
    audio-in: "Speech transcription / audio understanding"
    speech-out: "Text-to-speech generation"
    video-gen: "Text/image in, video out"
    audio-gen: "Text in, music or sound effect out"
    embedding: "Text in, vector out"
    reranking: "Query + candidates in, ordered candidates out"
    multimodal: "Multiple modalities native (e.g., images and audio mixed input)"

  constraint:
    cheap: "Sub-$1/M tokens or comparable"
    fast: "High tokens/sec or low time-to-first-token"
    thorough: "Slower but more comprehensive output"
    offline: "Runs locally with no network egress"
    no-rate-limit: "Unmetered or effectively unlimited under typical use"
    free: "No cost to user under typical use"
    open-weights: "Model weights publicly available, can be self-hosted"
    subscription: "Available via flat-rate subscription tier"
    premier: "Frontier-class capability, premium pricing"
    oss-default: "Marked as a default choice for open-source-first composition"

# ═══════════════════════════════════════════════════════════════════════════════
# INSTRUMENTS — backend execution frameworks (capabilities, not models)
# Per Phase 6: instruments determine CAPABILITIES; models determine CAPACITY.
# ═══════════════════════════════════════════════════════════════════════════════

instruments:

  claude-code:
    description: "Anthropic's official Claude CLI with full tool-use, file editing, MCP, web fetch"
    binary: "claude"
    auth: "anthropic_subscription_or_api_key"
    capabilities:
      - tool_use
      - file_edit
      - shell
      - web_fetch
      - mcp
      - vision
    runs_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
      - claude-sonnet-4-5-20250929
      - claude-opus-4-6
    fallback_instruments: [anthropic_api]
    notes: "Subscription tier offers cost predictability; API tier offers usage-based billing. Both supported."

  anthropic_api:
    description: "Direct Anthropic API; pay-per-token; same models as claude-code without CLI wrapper"
    auth: "anthropic_api_key"
    capabilities: [tool_use, vision]   # NO file_edit/shell — those are CLI-shell-specific
    runs_models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - claude-haiku-4-5-20251001
    fallback_instruments: []
    notes: "Use when you need model access without CLI tools (pure prompt-in/text-out)."

  gemini-cli:
    description: "Google's official Gemini CLI with tool use, file editing, vision"
    binary: "gemini"
    auth: "google_subscription_or_api_key"
    capabilities: [tool_use, file_edit, shell, vision, multimodal]
    runs_models:
      - gemini-3.1-pro-preview
      - gemini-3-flash-preview
      - gemini-2.5-pro
      - gemini-2.5-flash
    fallback_instruments: []
    notes: "Strong multimodal native support; good for vision-heavy tasks."

  codex-cli:
    description: "OpenAI's Codex CLI with tool use, file editing"
    binary: "codex"
    auth: "openai_plus_subscription_or_api_key"
    capabilities: [tool_use, file_edit, shell, vision]
    runs_models:
      - gpt-5.5
      - gpt-5
      - gpt-4.1
      - o4-mini
      - o3-mini
    fallback_instruments: []
    notes: "Plus subscription supplies GPT-5.5 access. Strong for cross-vendor verification of Claude work."

  opencode:
    description: "Multi-provider CLI; routes to OpenRouter, local providers, or specific endpoints"
    binary: "opencode"
    auth: "per_provider"
    capabilities: [tool_use, file_edit, shell, multi_provider]
    runs_models:
      # opencode can run essentially any provider it's configured for; below is
      # the subset routinely used in this user's setup.
      - zai-coding-plan/glm-5-turbo
      - zai-coding-plan/glm-4.7-flash
      - openrouter/minimax/minimax-m2.5:free
      - openrouter/google/gemma-4-31b-it:free
      - openrouter/nvidia/nemotron-3-super-120b-a12b:free
      - openrouter/z-ai/glm-4.5-air:free
      - openrouter/meta-llama/llama-4-maverick:free
    fallback_instruments: [aider, goose]
    notes: "Best instrument for accessing free-tier OpenRouter models. The Z.AI Coding Plan provides unlimited GLM via opencode — rate-limit-proof."

  aider:
    description: "AI-pair-programming CLI with strong git integration"
    binary: "aider"
    auth: "per_provider"
    capabilities: [tool_use, file_edit, git, shell, multi_provider]
    runs_models: ["any LiteLLM-supported model"]
    fallback_instruments: [goose, opencode]
    notes: "Good for code-focused work where git diff awareness matters."

  goose:
    description: "Block.xyz's open multi-provider agent CLI"
    binary: "goose"
    auth: "per_provider"
    capabilities: [tool_use, file_edit, shell, mcp, multi_provider]
    runs_models: ["any provider goose is configured for"]
    fallback_instruments: [aider, opencode]
    notes: "Strong MCP support; good agent loop capability."

  crush:
    description: "Charm.land's TUI multi-provider CLI"
    binary: "crush"
    auth: "per_provider"
    capabilities: [tool_use, multi_provider, terminal_ui]
    runs_models: ["any provider crush is configured for"]
    fallback_instruments: [opencode]
    notes: "TUI-first; useful for interactive work but less common in scripted scores."

  ollama:
    description: "Local model runner; no network required after model pull"
    binary: "ollama"
    auth: "none"
    capabilities: [local, offline, no_rate_limit, tool_use_partial]
    runs_models:
      # Models available depend on what user has pulled; below is a reasonable
      # default set for code/general work. Run `ollama list` to confirm.
      - llama3.3:70b
      - llama3.1:8b
      - qwen2.5-coder:32b
      - qwen2.5-coder:7b
      - qwen3-coder:30b
      - deepseek-v3
      - deepseek-coder-v2:16b
      - phi-4:14b
      - mistral-large:latest
      - codestral:22b
      - gemma3:27b
    fallback_instruments: []
    notes: "Open-source-first default. No rate limits, no per-token cost, full privacy. Speed and quality depend on local hardware."

  recursive_light:
    description: "TDF (Tetrahedral Decision Framework) judgment instrument"
    capabilities: [tdf_judgment, boundary_analysis, multi_domain_decomposition]
    runs_models: ["recursive_light internal"]
    fallback_instruments: []
    notes: "Specialized for boundary recognition and multi-domain reasoning. Used selectively, not for general work."

  cli:
    description: "Plain shell — bash. Deterministic, no LLM."
    binary: "bash"
    capabilities: [shell, deterministic]
    runs_models: []
    fallback_instruments: []
    notes: "Use for verification, gate stages, and deterministic transforms. Per Tool Chain pattern: cheaper than any LLM for what shell can do."

