# ═══════════════════════════════════════════════════════════════════════════════
# USE-CASE CHAINS — ranked recommendations per category
# Open-source-first: primary picks favor open weights / free tier.
# Subtle cross-vendor diversity in reviewer/verification chains.
# ═══════════════════════════════════════════════════════════════════════════════

use_case_chains:

  classification:
    description: "Cheap, fast routing/labeling/triage decisions"
    primary:
      - zai-coding-plan/glm-4.7-flash      # free + unlimited
      - phi-4:14b                           # local + free if user has it
    fallback:
      - gemini-3-flash-preview              # subscription, no rate limit
      - claude-haiku-4-5-20251001           # subscription, paid per token
    last_resort:
      - claude-sonnet-4-6
    rationale: "Open/free first; classification rarely needs frontier reasoning"

  code_generation:
    description: "Writing new code in any target language"
    primary:
      - qwen3-coder-480b-a35b-instruct          # NEW PRIMARY: Apache-2.0, 256K context, free OR
      - openrouter/minimax/minimax-m2.5:free    # SWE-Bench 80.2%, FREE
      - qwen2.5-coder:32b                        # local fallback
    fallback:
      - claude-sonnet-4-6                        # premier code at non-Opus cost
      - openrouter/google/gemma-4-31b-it:free
      - mistral-small-4                          # Apache-2.0 multimodal
    last_resort:
      - claude-opus-4-7
      - gpt-5.5
      - glm-5.1                                  # frontier-class with different blind spots
    rationale: "Qwen3-Coder-480B is the new strongest open code model — primary for serious work. MiniMax M2.5 still leads SWE-Bench Verified at 80.2%. Reserve premium for genuinely hard code."

  code_translation:
    description: "Translating code from one language to another (e.g., port-toolkit)"
    primary:
      - qwen3-coder-480b-a35b-instruct          # NEW PRIMARY
      - openrouter/minimax/minimax-m2.5:free
      - qwen2.5-coder:32b
      - deepseek-v4-pro                          # 1M context, replaces V3 sunsetting July 2026
    fallback:
      - claude-sonnet-4-6
      - mistral-small-4
    last_resort:
      - claude-opus-4-7                          # 1M context as of 2026-04-16
      - glm-5.1
    rationale: "Code translation rewards long-context retrieval and code specialization. Qwen3-Coder native 256K context wins. DeepSeek V4 displaces V3 (V3 sunsets 2026-07-24)."

  reasoning_verification:
    description: "Multi-step deduction, math, formal verification gates"
    primary:
      - deepseek-r1                          # open-weight reasoning, oss-default
      - qwq-32b                              # local Apache-2.0 reasoning
      - phi-4-reasoning                      # 75.3% AIME at 14B, MIT, runs anywhere
    fallback:
      - claude-opus-4-7
      - gemini-3.1-pro-preview
      - glm-5.1                              # frontier reasoning, MIT
    last_resort: []
    note: "o4-mini deprecated as of 2026-04-29 — removed from chain."
    rationale: "Reasoning models pay off here. Open-weight options are class-competitive. GLM 5.1 strong as cross-vendor verifier."

  careful_long_running_analysis:
    description: "Complex sustained work that requires careful, complete analysis. Multi-stage refactors, deep code review, long-form research synthesis where premature compression is the failure mode."
    primary:
      - glm-5.1                              # MIT, frontier; trusted by user over Gemini for this exact pattern
    fallback:
      - claude-opus-4-7                      # 1M context, adaptive thinking
      - kimi-k2.5                            # 1M context, agent-swarm capable
    last_resort:
      - gpt-5.5                              # 1M context, expensive
    rationale: "Per user direct testimony: GLM 5.1 outperforms Gemini for this pattern. Catalog primary even though it's an open-weight model — frontier ≡ capability tier, not vendor origin. Cite SWE-Bench Pro 58.4."
    notes: "GLM 5.1 needs chunked-write prompt guidance — see its quirks: field. Without that the prompt fails on large outputs."

  classification_at_scale:
    description: "Batch classification of many items where rate limits matter"
    primary:
      - zai-coding-plan/glm-4.7-flash       # truly unlimited
      - phi-4:14b                            # local
    fallback:
      - gemini-3-flash-preview
    last_resort: []
    rationale: "Pick rate-limit-proof options; the work is throughput-sensitive"

  long_document_synthesis:
    description: "Synthesis over very long inputs (>200K tokens)"
    primary:
      - gemini-3-flash-preview                  # 1M context, cheap
      - openrouter/meta-llama/llama-4-maverick:free   # 1M context
      - claude-opus-4-7                          # 1M context as of 2026-04-16, no premium
      - deepseek-v4-pro                          # 1M context
    fallback:
      - gemini-3.1-pro-preview                   # 2M context, premium
      - kimi-k2.5                                # 1M context, agent-swarm
    last_resort: []
    rationale: "Context window is the constraint. Gemini/Meta still lead at 2M; Anthropic now in the 1M club; DeepSeek V4 added the 1M open-weight."

  cross_vendor_review:
    description: "Adversarial verification — review primary work with a different vendor's eyes"
    pattern: "Use the thinking-lab.yaml score to fan out to all five vendor families simultaneously"
    typical_pairs:
      - { primary: claude-opus-4-7,        reviewer: gpt-5.5 }
      - { primary: claude-opus-4-7,        reviewer: gemini-3.1-pro-preview }
      - { primary: claude-opus-4-7,        reviewer: glm-5.1 }
      - { primary: gpt-5.5,                reviewer: claude-opus-4-7 }
      - { primary: gpt-5.5,                reviewer: glm-5.1 }
      - { primary: glm-5.1,                reviewer: claude-opus-4-7 }
      - { primary: qwen3-coder-480b-a35b-instruct, reviewer: claude-sonnet-4-6 }
      - { primary: openrouter/minimax/minimax-m2.5:free, reviewer: claude-sonnet-4-6 }
    rationale: "Different training lineages have different blind spots. GLM 5.1 added as a peer reviewer (frontier-class per SWE-Bench Pro 58.4). Subtle use only — when verification matters."
    notes: "Don't dilute by overusing. Only deploy on stages where review value beats coordination cost. GLM-as-reviewer needs chunking guidance in the prompt."

  agent_loops:
    description: "Multi-step agentic workflows with tool use and self-correction"
    primary:
      - openrouter/nvidia/nemotron-3-super-120b-a12b:free
      - claude-sonnet-4-6                    # premier balance of speed and quality
    fallback:
      - claude-opus-4-7
      - gpt-5.5
    last_resort: []
    rationale: "Agent loops eat tokens. Pay attention to per-call cost."

  runner_stage:
    description: "Mostly-deterministic CLI wrapping; needs to be cheap, reliable, no rate limits"
    primary:
      - cli                                  # the actual default — no LLM at all
      - zai-coding-plan/glm-4.7-flash        # if some LLM judgment needed
    fallback:
      - phi-4:14b                            # local, no rate limits
      - claude-haiku-4-5-20251001
    last_resort: []
    rationale: "Per The Tool Chain pattern: deterministic work doesn't need an LLM. Use cli; reach for an LLM only if real interpretation is required."

  open_default_general:
    description: "Generic 'best open-weights model for the job' default"
    primary:
      - qwen3-235b-a22b                      # general work, Apache-2.0
      - qwen3.6-27b                          # local dense, Apache-2.0
      - qwen3-coder-480b-a35b-instruct       # code-leaning
      - glm-5.1                              # frontier, MIT
    fallback:
      - openrouter/minimax/minimax-m2.5:free
      - openrouter/google/gemma-4-31b-it:free
      - mistral-small-4                      # 119B/6B-active, Apache-2.0
      - llama3.3:70b                         # legacy fallback
    last_resort:
      - claude-sonnet-4-6                    # paid fallback
    rationale: "Open-source-first. The 2026 open-weight ecosystem (Qwen3, GLM 5.1, DeepSeek V4, Mistral Small 4) is competitive with frontier proprietary models. Reach for paid only when no open option fits."
    notes: "Llama 3.3:70b is increasingly legacy as Llama 4 Maverick + Qwen3 + Mistral Small 4 take its slot. Demote on next refresh."

  # ── Specialization chains (capability shopping) ──────────────────────────────

  speech_transcription:
    description: "Converting audio to text"
    primary: [whisper-large-v3, nvidia-parakeet-tdt-0.6b-v2]
    fallback: [distil-whisper-large-v3, nvidia-canary-1b]
    note: "facebook/seamless-m4t-v2-large for translation pipelines; CC-BY-NC-4.0 license."
    rationale: "Whisper is canonical for batch. Parakeet for streaming. Canary for ASR+translation."

  speech_synthesis:
    description: "Generating speech from text"
    primary: [kokoro-tts, f5-tts, sesame-csm]
    fallback: [openvoice-v2, xtts-v2, bark]
    last_resort: [elevenlabs-v3]
    rationale: "Open TTS ecosystem matured 2024-2026: F5-TTS (MIT, voice cloning), Sesame CSM (Apache-2.0, conversational, 24kHz, in HF Transformers), Kokoro for fast/small. Bark for sound effects + speech. ElevenLabs only when commercial-grade output is genuinely required."

  image_generation:
    description: "Generating images from text"
    primary: [flux-schnell, flux-1-dev, sdxl-lightning]
    fallback: [stable-diffusion-3.5-large, pixart-sigma, hidream-i1-full]
    last_resort: [flux-1-pro, ideogram-v3, recraft-v3]
    rationale: "Open weights cover most needs. SDXL Lightning for fast iteration; PixArt-Σ for high-resolution; Ideogram/Recraft when text rendering or vector design matters."
    note: "imagen-3 sunset (migrate by 2026-06-30). Removed from chain."

  video_generation:
    description: "Generating video from text or images"
    primary: [wan2.1-t2v-14b, ltx-video, mochi-1, hunyuan-video]
    fallback: [cogvideox-5b]
    last_resort: [veo-3, sora-2]
    rationale: "Open weights took the lead in 2025-2026. Wan 2.1 (Apache-2.0), Mochi-1 (Apache-2.0), LTX-Video, Hunyuan, CogVideoX. Commercial APIs (Veo/Sora) only when final-render quality demands it."
    note: "stable-video-diffusion-img2vid-xt deprecated (xt-1-1 successor). Removed from chain."

  text_embeddings:
    description: "Vectorizing text for retrieval"
    primary: [stella-en-1.5b-v5, mixedbread-ai/mxbai-embed-large-v1, bge-large-en-v1.5, nomic-embed-text-v1.5]
    fallback: [jina-embeddings-v3, cohere-embed-v4, voyage-3, text-embedding-3-large]
    multimodal_primary: [nomic-embed-vision-v1.5, cohere-embed-v4]
    rationale: "Open embeddings (Stella, Mixedbread, BGE, Nomic) match commercial managed embeddings on most retrieval. Cohere Embed v4 wins for multimodal text/image/PDF. Jina v3 for task-specific LoRA adapters."

  reranking:
    description: "Reranking retrieval candidates"
    primary: [bge-reranker-v2-m3, jina-reranker-v2-base-multilingual]
    fallback: [cohere-rerank-3.5]
    rationale: "Open rerankers (BGE, Jina) cover open RAG stacks; Cohere when managed reliability is required."

# ═══════════════════════════════════════════════════════════════════════════════
# FRESHNESS POLICY
# ═══════════════════════════════════════════════════════════════════════════════

freshness:
  catalog_check_interval_days: 30
  musician_stale_threshold_days: 90
  on_stale: "catalog-refresh.yaml run; thinking-lab cross-rating refresh; vendor research diff"
  refresh_score: "scores/instrument-catalog-refresh.yaml"
